<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css?family=Itim" rel="stylesheet">
    <title>DogLover - Contact Us</title>
    <style>
        body { background: linear-gradient(135deg, #aee5ff 0%, #ffffff 100%); background-attachment: fixed; font-family: 'Itim', sans-serif; padding-top: 100px; }
        .contact-card { background: white; border-radius: 30px; padding: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-info fixed-top shadow">
        <div class="container">
            
            <!-- Gyphicon -->
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-suit-heart-fill text-danger"></i> DogLover
            </a>
            <!-- Gyphicon -->
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">หน้าแรก</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">ติดต่อเรา</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Navigation Bar -->

    <div class="container">
        <div class="contact-card shadow">
            <div class="row align-items-center">
                <div class="col-md-6 text-center">
                    <h2 class="text-primary fw-bold mb-4">พูดคุยกับเรา <i class="bi bi-chat-heart"></i></h2>
                    <p>ส่งข้อความหาเราได้ตลอดเวลา เราจะรีบตอบกลับโดยเร็วที่สุด</p>
                    <hr class="w-25 mx-auto">
                    <p><i class="bi bi-envelope-fill text-info"></i> contact@doglover.com</p>
                    <p><i class="bi bi-telephone-fill text-info"></i> 02-123-4567</p>
                </div>
                <div class="col-md-6">
                    <form action="#">
                        <div class="mb-3"><input type="text" class="form-control rounded-pill" placeholder="ชื่อของคุณ"></div>
                        <div class="mb-3"><input type="email" class="form-control rounded-pill" placeholder="อีเมล"></div>
                        <div class="mb-3"><textarea class="form-control" rows="4" style="border-radius: 20px;" placeholder="ข้อความ..."></textarea></div>
                        <button type="submit" class="btn btn-info w-100 rounded-pill text-white shadow-sm">ส่งข้อความ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
